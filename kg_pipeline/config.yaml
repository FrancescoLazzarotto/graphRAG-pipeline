seed: 42

paths:
  input_dir: ./documents/test 1
  output_dir: ./kg_pipeline/artifacts

# Ontology for the circular-food corpus, curated from the open-vocab discovery
# run (kg_pipeline/artifacts/discovery_20260706_151305/ontology_proposal.md).
ontology:
  labels:
    - Organization
    - Person
    - Place
    - Product
    - Material
    - Process
    - Method
    - Project
    - Indicator
    - DataValue
    - Policy
    - Document
    - Event
    - Concept

# Adaptive chunking: documents are routed to one of three windowing profiles
# by page count (<=small_max_pages: paragraph chunks gated by min/max tokens;
# <=medium_max_pages: 512-token windows; larger: 1024-token windows).
chunking:
  small_max_pages: 10
  medium_max_pages: 80
  small_min_tokens: 200
  small_max_tokens: 400
  medium_window_tokens: 512
  medium_overlap_tokens: 128
  large_window_tokens: 1024
  large_overlap_tokens: 256

# Multilingual model: the corpus is mixed English/Italian.
gliner:
  model_name: urchade/gliner_multi-v2.1
  threshold: 0.45

llm:
  max_retries_per_chunk: 3
  temperature: 0.0
  use_structured_output: true
  relation_vocab_path: relation_vocab_circular_v1_draft.json

# Multilingual embeddings so IT/EN surface forms of the same entity become
# merge candidates; 0.88 carried over from the previous model as a starting
# point - re-validate on the pilot run before the full corpus.
resolution:
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  similarity_threshold: 0.88
  context_jaccard_floor: 0.15

# Intentional: '588fe1bc' is the AuraDB instance database name for this
# project. This value takes precedence over NEO4J_DATABASE; remove or blank
# the key to fall back to the env var on other setups.
neo4j:
  database: '588fe1bc'

# Intentional: MENTIONED_IN edges are excluded to keep the graph lean for
# retrieval; SAME_AS alias edges are still produced. Set to true to also
# materialize entity->document mention edges.
linking:
  include_mentioned_in: false
