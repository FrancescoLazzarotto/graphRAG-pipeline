name: Validate Docs

on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "evaluation/README.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "evaluation/README.md"

jobs:
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check markdown syntax
        run: |
          python -m pip install mdformat
          mdformat --check README.md AGENTS.md docs/cluster.md evaluation/README.md

      - name: Verify file links
        run: |
          python -c "
          import re
          from pathlib import Path
          
          docs = ['README.md', 'AGENTS.md', 'docs/cluster.md', 'evaluation/README.md']
          for doc in docs:
              if not Path(doc).exists():
                  continue
              content = Path(doc).read_text()
              # Check for broken internal links
              links = re.findall(r'\[.*?\]\((.*?)\)', content)
              for link in links:
                  if link.startswith('http'):
                      continue
                  target = Path(link.split('#')[0])
                  if target and not target.exists():
                      print(f'Broken link in {doc}: {link}')
          "
